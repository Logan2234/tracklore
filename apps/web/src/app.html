<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0c0d10" />
    <!-- @vite-pwa/sveltekit does not inject the manifest link (SvelteKit owns
         the head), so link it here — without it the browser only offers a
         plain shortcut (address bar stays) instead of a real PWA install. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <script>
      // Apply the saved (or system) theme before first paint to avoid a flash.
      try {
        const saved = localStorage.getItem("tl-theme");
        const dark = saved
          ? saved === "dark"
          : matchMedia("(prefers-color-scheme: dark)").matches;
        if (dark) document.documentElement.classList.add("dark");
      } catch {}
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
