# Override that exposes the local stack to your phone through ngrok.
# It adds a single-origin Caddy reverse proxy and derives every URL from the
# one value you set in .env: NGROK_DOMAIN. Use it on top of the base compose:
#
#   docker compose -f docker-compose.yml -f docker-compose.ngrok.yml up -d
#
# Then run the tunnel (see README "Mobile access"):  ngrok start tracklore
services:
  # web + API share one origin (the proxy), so both URLs come from NGROK_DOMAIN.
  web:
    environment:
      PUBLIC_API_URL: https://${NGROK_DOMAIN:?set NGROK_DOMAIN in .env}/api
      PUBLIC_NGROK: "true"

  api:
    environment:
      WEB_ORIGIN: https://${NGROK_DOMAIN:?set NGROK_DOMAIN in .env}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
      - web
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    ports:
      - "${PROXY_PORT:-8088}:80"
