# Example ngrok config for exposing the local stack to your phone.
# Copy to ngrok.yml, fill in the two values, then run:  ngrok start tracklore
#
# - authtoken: from https://dashboard.ngrok.com/get-started/your-authtoken
# - domain:    claim your one free static domain at
#              https://dashboard.ngrok.com/domains  (looks like
#              something.ngrok-free.app) so the URL survives restarts —
#              a stable URL is required for an installed PWA.
version: "2"
authtoken: YOUR_NGROK_AUTHTOKEN
tunnels:
  tracklore:
    proto: http
    # Must match PROXY_PORT (the Caddy reverse proxy), not web/api directly.
    addr: 8088
    domain: YOUR-STATIC-DOMAIN.ngrok-free.app
