services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tracklore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-tracklore}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-tracklore} -d ${POSTGRES_DB:-tracklore}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-tracklore}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-tracklore}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set JWT_ACCESS_SECRET in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET in .env}
      TMDB_API_TOKEN: ${TMDB_API_TOKEN:-}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:8080}
    ports:
      - '${API_PORT:-3000}:3000'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      # URL the *browser* uses to reach the API, so it must be reachable
      # from outside the compose network.
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:3000/api}
    ports:
      - '${WEB_PORT:-8080}:3000'

volumes:
  db-data:
