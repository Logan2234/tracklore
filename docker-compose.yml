services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tracklore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-tracklore}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-tracklore} -d ${POSTGRES_DB:-tracklore}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-tracklore}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-tracklore}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set JWT_ACCESS_SECRET in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET in .env}
      TMDB_API_TOKEN: ${TMDB_API_TOKEN:-}
      OMDB_API_KEY: ${OMDB_API_KEY:-}
      TWITCH_CLIENT_ID: ${TWITCH_CLIENT_ID:-}
      TWITCH_CLIENT_SECRET: ${TWITCH_CLIENT_SECRET:-}
      STEAM_API_KEY: ${STEAM_API_KEY:-}
      GOOGLE_BOOKS_API_KEY: ${GOOGLE_BOOKS_API_KEY:-}
      # MusicBrainz usage-policy contact (email/URL); empty = a generic
      # fallback is sent as the User-Agent, music search still works.
      MUSICBRAINZ_CONTACT: ${MUSICBRAINZ_CONTACT:-}
      # Web Push (VAPID); empty = push silently disabled, in-app still works.
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@example.com}
      # Outgoing email (SMTP); empty = email silently disabled. See "Email" in README.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: "${SMTP_FROM:-Tracklore <no-reply@tracklore.app>}"
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:8080}
      BACKUP_DIR: /data/backups
    volumes:
      - backup-data:/data/backups
    ports:
      - "${API_PORT:-3000}:3000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      # URL the *browser* uses to reach the API, so it must be reachable
      # from outside the compose network.
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:3000/api}
    ports:
      - "${WEB_PORT:-8080}:3000"

volumes:
  db-data:
  backup-data:
